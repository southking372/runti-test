<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RUNTI · 跑者人格深度测试</title>
    <!-- 紫金配色 · 雷达图增强 · 特别鸣谢王景贤 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js 轻量雷达图 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #2e1a47 0%, #140a21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: #f5e9fc;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            background: rgba(46, 26, 71, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(212, 175, 55, 0.35);
            border-radius: 56px;
            box-shadow: 0 30px 50px -10px rgba(0,0,0,0.7), 0 0 0 1px rgba(212, 175, 55, 0.2) inset;
            padding: 28px 22px 36px;
            transition: all 0.2s;
        }

        .gold-stripe {
            height: 5px;
            background: linear-gradient(90deg, #d4af37, #ffe28c, #d4af37);
            border-radius: 5px;
            width: 100px;
            margin: 12px auto 20px;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* 首页 */
        .hero {
            text-align: center;
            margin-bottom: 20px;
        }
        .hero-icon {
            font-size: 72px;
            filter: drop-shadow(0 10px 14px #00000055);
            margin-bottom: 8px;
        }
        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #f9e7b2 0%, #d4af37 40%, #ffe28c 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 16px #00000060;
            line-height: 1.2;
        }
        .subhead {
            font-size: 1.1rem;
            color: #cdb5e8;
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .credit-block {
            background: rgba(212, 175, 55, 0.07);
            border-radius: 40px;
            padding: 18px 20px;
            margin: 28px 0 22px;
            border-left: 8px solid #d4af37;
            backdrop-filter: blur(4px);
            text-align: left;
        }
        .credit-line {
            display: flex;
            align-items: baseline;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .credit-line i {
            color: #d4af37;
            width: 28px;
            font-size: 1.2rem;
        }
        .credit-line strong {
            color: #ffdfa0;
            margin-right: 8px;
        }
        .special-thanks {
            margin-top: 6px;
            font-style: italic;
            color: #e0c3ff;
            border-top: 1px dashed #d4af3760;
            padding-top: 12px;
        }

        .illustration-runner {
            display: flex;
            justify-content: center;
            margin: 16px 0 12px;
        }
        .btn-gold {
            background: linear-gradient(145deg, #d4af37 0%, #b58d1e 100%);
            border: none;
            color: #1b0e2e;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 20px 28px;
            border-radius: 80px;
            width: 100%;
            box-shadow: 0 16px 24px -6px #00000080, 0 2px 0 0 #ffeab0 inset;
            letter-spacing: 2px;
            transition: 0.15s;
            cursor: pointer;
            border: 1px solid #ffeab0;
            font-family: 'Quicksand', sans-serif;
            margin-top: 12px;
        }
        .btn-gold:active { transform: scale(0.98); box-shadow: 0 8px 14px -4px black; }
        .btn-outline-gold {
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }
        .btn-outline-gold:hover { background: #d4af3718; }

        .progress-area { margin: 20px 0 24px; }
        .progress-text {
            display: flex;
            justify-content: space-between;
            color: #ddc3ff;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 1rem;
        }
        .progress-bar-bg {
            height: 14px;
            background: #3f2a54;
            border-radius: 40px;
            box-shadow: inset 0 3px 6px #00000066;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #f9e076);
            border-radius: 40px;
            box-shadow: 0 0 12px #ffd966;
            transition: width 0.3s;
        }

        /* 题目卡片 */
        .question-card {
            background: rgba(62, 36, 91, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px 22px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 15px 25px -8px #00000060;
            margin-bottom: 24px;
        }
        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 32px;
            color: #f3e6ff;
            text-shadow: 0 3px 8px #00000040;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .option-btn {
            background: #2d1a3f;
            border: 1.5px solid #5f4a72;
            border-radius: 50px;
            padding: 20px 22px;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
            color: #ede2f5;
            box-shadow: 0 5px 8px #00000033;
            cursor: pointer;
            transition: all 0.15s;
            backdrop-filter: blur(5px);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            word-break: break-word;
        }
        .option-btn i {
            color: #d4af37;
            font-size: 1.7rem;
            width: 28px;
            text-align: center;
            margin-top: 2px;
        }
        .option-btn.selected {
            background: #4f2e6e;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px #d4af3733, 0 6px 12px black;
            color: white;
        }

        /* 结果卡片 */
        .result-header { text-align: center; margin-bottom: 16px; }
        .personality-code {
            font-size: 4.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d547, #ffe28c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
        }
        .personality-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffeaaf;
        }
        .match-badge {
            display: inline-block;
            background: #d4af37;
            color: #1b0e2e;
            font-weight: 800;
            padding: 10px 26px;
            border-radius: 50px;
            margin: 16px 0 8px;
            font-size: 1.3rem;
        }
        .desc-box {
            background: #1f112b;
            border-radius: 36px;
            padding: 26px 22px;
            border-left: 8px solid #d4af37;
            margin: 24px 0 20px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e3d0ff;
        }
        /* 雷达图容器 */
        .radar-container {
            background: #1f112b80;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 20px 12px;
            margin: 20px 0 16px;
            border: 1px solid #d4af3740;
        }
        .radar-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d4af37;
            margin-bottom: 10px;
            font-weight: 600;
            padding-left: 8px;
        }
        canvas {
            width: 100% !important;
            height: auto !important;
            max-height: 320px;
        }
        .footer-actions { display: flex; gap: 14px; margin-top: 10px; }
        .decor-gold-dots { display: flex; justify-content: center; gap: 10px; margin: 16px 0; }
        .dot { width: 10px; height: 10px; background: #d4af37; border-radius: 50%; opacity: 0.6; }

        .flex-center { display: flex; justify-content: center; }
        i { margin-right: 8px; }
        @media (max-width: 480px) {
            .app-container { padding: 20px 14px; }
            h1 { font-size: 2.5rem; }
            .question-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 首页视图 -->
    <div id="homeView" class="view active">
        <div class="hero">
            <div class="hero-icon">
                <i class="fas fa-person-running" style="color: #d4af37; text-shadow: 0 0 20px #ffd966;"></i>
                <i class="fas fa-crown" style="color: #ffd966; margin-left: -10px;"></i>
            </div>
            <h1>RUNTI</h1>
            <div class="gold-stripe"></div>
            <div class="subhead">跑者人格深度测试 · 紫金版</div>
        </div>

        <div class="illustration-runner">
            <div style="background: #3f2a5433; border-radius: 120px; padding: 14px 28px; backdrop-filter: blur(4px); border: 1px solid #d4af3740;">
                <i class="fas fa-shoe-prints" style="color: #d4af37; font-size: 34px; transform: rotate(-25deg);"></i>
                <i class="fas fa-medal" style="color: #ffd966; font-size: 52px; margin: 0 12px;"></i>
                <i class="fas fa-shoe-prints" style="color: #d4af37; font-size: 34px; transform: rotate(25deg);"></i>
            </div>
        </div>

        <div class="credit-block">
            <div class="credit-line"><i class="fas fa-feather-alt"></i> <strong>作者：</strong>成牧云</div>
            <div class="credit-line"><i class="fas fa-lightbulb"></i> <strong>灵感来源：</strong>B站 蛆肉儿串儿</div>
            <div class="credit-line"><i class="fas fa-users"></i> <strong>系统实现：</strong>阿迪王公主传全员 · DeepSeek</div>
            <div class="special-thanks">
                <i class="fas fa-heart" style="color: #d4af37; margin-right: 8px;"></i>
                <strong>特别鸣谢：</strong>王景贤
            </div>
        </div>

        <p style="text-align: center; margin: 10px 0 22px; color: #cbb2e6; font-weight: 500; font-size: 1.1rem;">
            <i class="fas fa-flag-checkered"></i> 16种跑者人格 · 内含抽筋门控 & 收容车彩蛋
        </p>

        <button class="btn-gold" id="startBtn">
            <i class="fas fa-play"></i> 开始深度测试 <i class="fas fa-arrow-right"></i>
        </button>

        <div class="decor-gold-dots">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <p style="text-align: center; font-size: 0.85rem; opacity: 0.75;">🏃 每个选项都经过跑者群反复推敲，请诚实作答</p>
    </div>

    <!-- 答题视图 (与之前一致，无变化) -->
    <div id="quizView" class="view">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
            <i class="fas fa-chevron-left" id="backHomeFromQuiz" style="font-size: 28px; color: #d4af37; cursor: pointer;"></i>
            <span style="font-weight: 600; color: #e3c9ff; font-size: 1.2rem;">RUNTI · 答题中</span>
        </div>
        <div class="progress-area">
            <div class="progress-text">
                <span id="currentQNumber">1</span>
                <span id="totalQNumber">/30</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <div id="quizCard" class="question-card">
            <div class="question-text" id="questionText">加载题目中...</div>
            <div class="options-list" id="optionsContainer"></div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 8px;">
            <button class="btn-outline-gold" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> 上一题</button>
            <button class="btn-outline-gold" id="nextBtn">下一题 <i class="fas fa-arrow-right"></i></button>
        </div>
        <p style="text-align: right; margin-top: 18px; font-size: 0.9rem;"><i class="fas fa-dumbbell"></i> 请务必每题都选，不可跳过</p>
    </div>

    <!-- 结果视图（新增雷达图） -->
    <div id="resultView" class="view">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
            <i class="fas fa-home" id="homeFromResult" style="font-size: 26px; color: #d4af37; cursor: pointer;"></i>
            <span style="font-weight: 500;">你的跑者真面目</span>
        </div>
        <div class="result-header">
            <div class="personality-code" id="resultCode">ELITE</div>
            <div class="personality-name" id="resultName">天赋怪</div>
            <span class="match-badge" id="matchDisplay">匹配度 94%</span>
        </div>
        <div class="illustration-runner">
            <i class="fas fa-trophy" style="font-size: 56px; color: #d4af37; filter: drop-shadow(0 6px 10px black);"></i>
        </div>
        <div class="desc-box" id="resultDesc">
            你跑得又快装备又骚...
        </div>
        <!-- 雷达图区域 -->
        <div class="radar-container">
            <div class="radar-title">
                <i class="fas fa-chart-pie"></i> 15维跑者能力图谱
            </div>
            <canvas id="radarChart"></canvas>
        </div>
        <div style="background: #2b1a3c; border-radius: 40px; padding: 18px; font-size: 1rem; color: #cfb3ff; display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-bullseye" style="color: #d4af37;"></i> <span id="exactMatchInfo">精准命中 12/15 维</span>
        </div>
        <div class="footer-actions">
            <button class="btn-gold" id="restartBtn" style="font-size: 1.2rem; padding: 18px;"><i class="fas fa-rotate-left"></i> 再跑一次</button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 紫金跑者数据 ----------
        const DIMENSION_ORDER = ["P1","P2","P3","G1","G2","G3","M1","M2","M3","S1","S2","S3","R1","R2","R3"];
        // 维度显示标签（简短）
        const DIM_LABELS = ["配速焦虑","负分割执念","起步控制","装备党指数","能量胶依赖","凡尔赛伤痛","赛道同情心","垃圾话阈值","终点表情","私补依赖","排空执念","赛后放纵","奖牌炫耀","复盘强迫","下一场冲动"];
        
        const PERSONALITY_TYPES = [
            { code: "ELITE", pattern: "HHH-HMH-HHH-HHH-MHL", cn: "天赋怪", intro: "跑得又快装备又骚，看着就来气。", desc: "你是赛道上的绝对王者，PB只是热身。别人拼尽全力才能勉强跟上你的慢跑配速。你从不刻意炫耀，但你的碳板跑鞋、全顶背心和那副云淡风轻的表情，已经让周围跑者咬牙切齿。小心别被人在补给站下毒。" },
            { code: "PBOT", pattern: "HHH-HHL-HMH-HMH-HLH", cn: "PB魔怔人", intro: "为了PB可以吃生鸡蛋，赛前不洗头。", desc: "你的生命只有两种状态：刷新PB，和为刷新PB做准备。课表是你亲爹，手表数据是你圣旨。如果有人胆敢在赛道上跟你搭话影响你0.5秒的配速，你会用眼神杀死他。请记住，PB虽好，但黑指甲也是真的疼。" },
            { code: "SHOWR", pattern: "MHH-HHH-MHL-HMM-HLH", cn: "赛道模特", intro: "照片比成绩重要，衣服比命值钱。", desc: "你跑马拉松的目的只有一个：出片。你会为了一身好看的穿搭专门报一场比赛。终点前你会精确计算与摄影师的距离，摆出最完美的Pose，赛后你花在选照片上的时间比跑步训练还长。成绩？那是背景板的一部分。" },
            { code: "GRIND", pattern: "HHM-HMM-HHH-HHH-MHL", cn: "严肃卷王", intro: "课表是圣经，跑休是罪恶。", desc: "你相信科学训练，鄙视一切“欢乐跑”。你的手表里存着未来三个月的课表，你的冰箱里塞满了能量胶和蛋白粉。你会在群里发自己心率区间的截图，并配文“今天有氧慢跑20K”。周围的人只想对你说：你慢点，我们跟不上。" },
            { code: "CHASR", pattern: "MHM-HHL-HMM-MMH-MHH", cn: "私兔型跑者", intro: "自己的PB无所谓，队友必须稳。", desc: "你是赛道上最温暖的存在。你会为了陪朋友完成首马而放弃自己的成绩，你会精准地控速，在每一个补给站帮朋友拿水。你享受的不是个人荣誉，而是把别人带过终点线时的那份成就感。别人家的私兔，说的就是你。" },
            { code: "BONKY", pattern: "HML-LMH-LMH-HHM-LHL", cn: "老抽人", intro: "逢赛必抽，抽完必发朋友圈。", desc: "30公里对你来说不是墙，是抽筋的发令枪。你的小腿肌肉有着自己的想法，一旦闹脾气，你就只能站在路边表演行为艺术。不过你心态极好，抽筋了也要掏出手机录一段视频，配文：“又抽了兄弟们，下次一定好好练力量！”" },
            { code: "TOURI", pattern: "MHL-MLM-HLM-MLM-MLH", cn: "旅游跑者", intro: "去一个城市跑马，顺便吃垮一条街。", desc: "对你来说，马拉松只是旅行的副产品。你会提前三天到比赛城市，把网红餐厅、景点逛个遍。比赛当天你更像是在参加一场移动自助餐，跑完立刻拖着残腿奔赴下一场美食盛宴。PB不重要，吃回报名费才重要。" },
            { code: "OGSCH", pattern: "MMH-MMM-HML-LMM-MML", cn: "老鸟", intro: "报啥中啥，但现在已经不追求成绩了。", desc: "你已经跑过几十场马拉松，中签率高得离谱，但你早已看淡一切。你不跟人比装备，也不聊配速，只是默默享受着赛道上的氛围。你是新手眼中的大神，但在你心里，自己只是个喜欢跑步的普通人。跑圈老油条，心态稳得很。" },
            { code: "ZULU", pattern: "HHM-HHH-MLH-MLM-MMH", cn: "装备党主席", intro: "全身加起来够买一辆电动车。", desc: "你的跑鞋矩阵比大多数人的衣柜还复杂，你对每一代碳板跑鞋的中底材料如数家珍。你可以跑得慢，但装备必须是最顶级的。每当新款跑鞋发售，你的手就不受控制。跑圈军备竞赛，就是你这种人带起来的。" },
            { code: "WHINR", pattern: "LLH-LHL-LML-LLL-MLM", cn: "跑圈祥林嫂", intro: "“要不是30公里抽筋，我就330了。”", desc: "你其实跑得不慢，但你每次跑完都会有一箩筐的借口：起跑被堵了、今天湿度太大、补给站水太凉、30公里那个坡太陡……你总是差一点点就能PB，而这个“一点点”能让你念叨一整年。" },
            { code: "PACER", pattern: "HHL-HMH-MMH-HHM-LHH", cn: "野生兔子", intro: "官方没选上，自己举牌跑。", desc: "你天生自带控速芯片，节奏感极强。虽然没有官方兔子的气球，但你会在手里拿个水瓶或者自己做个配速手环，默默地带着周围一群人跑。你是赛道上的无名英雄。" },
            { code: "STAGR", pattern: "HHL-HMH-MLH-MHM-LHH", cn: "朋友圈战神", intro: "跑前跑后各十条动态，跑时消失。", desc: "你跑马拉松的精华全在朋友圈里。赛前晒定妆照、晒号码布；赛后晒奖牌、晒成绩。唯独比赛过程中那四五个小时，你像人间蒸发了一样。朋友都懂：跑得动的时候没空发，跑不动的时候没脸发。" },

            { code: "BANDT", pattern: "LLL-LLM-LML-LLL-LHM", cn: "黑指甲收藏家", intro: "十个脚趾甲只剩三个是自己的。", desc: "你的脚趾甲是消耗品，每跑一场马就得脱落一个。你对黑指甲的处理已经轻车熟路。就是夏天穿凉鞋的时候有点社死。" },
            { code: "COUCH", pattern: "LLH-LHL-LML-LLL-MLL", cn: "嘴炮跑者", intro: "报名从不缺席，比赛从不到场。", desc: "你是跑圈气氛组组长。赛前你喊得最响，分析得头头是道，但一到比赛日，你总有各种理由无法出现在起跑线前。你的跑友已经习惯了你的“下一次一定”。" }

        const SPECIAL_TYPES = [

            { code: "SWEEP", cn: "收容车VIP", desc: "你这个人太抽象了，现有的16种跑者人格根本容不下你。你可能根本就没跑过步，或者你的跑步习惯已经超出了人类理解的范畴。师傅，麻烦收容车空调开大点，后面还有一箱矿泉水。" }

        // 详细题目 (与之前相同，略)
        const BASE_QUESTIONS = [
            { id:"q1", dim:"P1", text:"发令枪响，你跨过拱门按下手表。第一公里，身边的人流和你的配速通常是什么状态？", opts:[{l:"发枪就是干！管他什么策略，先冲出去再说，把前面的人都超了，后面崩了再走。",v:1},{l:"比目标配速大概快个10秒左右，感觉体感不错，稍微快一点问题不大。",v:2},{l:"严格按照赛前写在手腕上的配速计划执行，±2秒内，心率绝对不能飘。",v:3}] },
            { id:"q2", dim:"P1", text:"跑到一半发现当前配速比目标慢了5秒，而且维持了好几公里，你会？", opts:[{l:"慢就慢呗，反正完赛就有奖牌，今天状态不好就享受赛道吧。",v:1},{l:"心里咯噔一下，赶紧看一眼心率，然后脚下偷偷加一点速，试图把时间追回来。",v:2},{l:"立刻开启「亡命追赶模式」，心率飙升也要追！今天必须跑进目标，不然白练了。",v:3}] },
            { id:"q3", dim:"P2", text:"关于「负分割」（后半程比前半程快），以下哪句最接近你的真实想法？", opts:[{l:"负分割是什么高级词汇？能吃吗？我只要后半程不走路上收容车就行。",v:1},{l:"理想很丰满，现实是每次跑到30公里腿就不听使唤，能维持就不错了。",v:2},{l:"必须负分割！我前半程专门压速度装死，就是为了后半程超人，爽感翻倍。",v:3}] },
            { id:"q4", dim:"P2", text:"比赛进行到30公里，你看了眼手表，发现今天实现负分割基本无望，你会？", opts:[{l:"立刻切换成「享受比赛模式」，遇到摄影师就笑，遇到补给站就吃。",v:1},{l:"咬咬牙，心想后半程至少不能比前半程慢太多，保住颜面。",v:2},{l:"心态瞬间崩了，觉得这场比赛白跑了，配速直接掉出银河系，开始走路。",v:3}] },
            { id:"q5", dim:"P3", text:"过拱门按下手表开始记录，你观察周围人流的速度，实际情况是？", opts:[{l:"我像一颗子弹，周围所有人都在我身后，一个不留。",v:1},{l:"我基本上随着大部队的节奏一起前进，不冒进也不掉队。",v:2},{l:"连推着婴儿车的大爷、cosplay的选手都把我超了，我还在慢慢热身。",v:3}] },
            { id:"q6", dim:"P3", text:"赛前你信誓旦旦制定了「前5公里一定要压住速度」的计划，执行情况通常是？", opts:[{l:"计划？我从来不写计划，起跑就是干，跑成什么样全靠天意。",v:1},{l:"压是压了，但没完全压住。体感一好又忍不住快了点，但整体还行。",v:2},{l:"前5公里我跑出了热身慢跑的感觉，身边无数跑者用白眼翻我，但我不为所动。",v:3}] },
            { id:"q7", dim:"G1", text:"打开你的鞋柜（或者鞋架），属于跑步专用的鞋子数量是多少？", opts:[{l:"1-2双，一双日常训练，一双比赛用，穿烂了才会买新的。",v:1},{l:"3-5双，会根据不同训练场景（慢跑、间歇、比赛）换着穿。",v:2},{l:"6双以上，甚至有一双只穿过一次的限量款碳板，专门用来拍照。",v:3}] },
            { id:"q8", dim:"G1", text:"对于现在跑圈几乎人手一双的「碳板跑鞋」，你的态度是？", opts:[{l:"太贵了，我不配。我穿多威或者基础款一样跑得开心。",v:1},{l:"比赛时会穿，毕竟能提升成绩，但平时训练舍不得，怕磨损太快。",v:2},{l:"训练碳板、比赛碳板、连下楼取个快递我也要穿碳板，推进感不能停。",v:3}] },
            { id:"q9", dim:"G2", text:"一场全程马拉松比赛，你通常会提前准备多少根能量胶带在身上？", opts:[{l:"1-2根意思一下，主要靠赛道上的香蕉和饮料。",v:1},{l:"严格按照说明书，赛前一根，比赛中每45分钟一根，大概4-5根。",v:2},{l:"8根起步！口袋里除了能量胶还塞了盐丸、酸轻片、电解质粉，像个移动补给站。",v:3}] },
            { id:"q10", dim:"G2", text:"在赛道上看到有人吃能量胶像在「挤牙膏」，表情痛苦万分，你内心的感受是？", opts:[{l:"太理解了，我也觉得能量胶又甜又腻，糊嗓子眼。",v:1},{l:"他为什么不买口感好一点、稀一点的胶？或者赛前没试过口味吗？",v:2},{l:"我早就换成等渗的液体胶了，吃胶也是一种体验，不能委屈自己。",v:3}] },
            { id:"q11", dim:"G3", text:"脱下袜子，请诚实描述你的脚趾甲现状：", opts:[{l:"完好无损，十个脚趾甲整整齐齐，一个都不少。",v:1},{l:"有一个脚趾甲已经变黑，正在等待它自然脱落，其他还好。",v:2},{l:"十个脚趾甲只剩大概七个是自己的，另外三个是黑紫色的「勋章」。",v:3}] },
            { id:"q12", dim:"G3", text:"跑友群里有人问「膝盖外侧跑完特别疼，怎么办啊？」，你的第一反应是？", opts:[{l:"默默看着，我从来没疼过，也不懂这些伤病。",v:1},{l:"建议他休息几天，或者滚泡沫轴试试，不要硬撑。",v:2},{l:"立刻打出500字小作文，从髂胫束综合征的成因讲到康复训练，停不下来。",v:3}] },
            { id:"q13", dim:"M1", text:"比赛中段，你看见一个跑者因为抽筋停在路边，扶着栏杆表情狰狞，你会怎么做？", opts:[{l:"默默从他身边飘过，内心毫无波澜，毕竟比赛是残酷的。",v:1},{l:"经过他身边时大喊一声“加油！”，然后继续跑自己的配速。",v:2},{l:"停下来问他“需要盐丸吗？”，甚至愿意帮他压一下腿，哪怕耽误自己时间。",v:3}] },
            { id:"q14", dim:"M1", text:"终点前200米，你看到一个选手倒在地上，挣扎着想爬起来冲线，你的心情是？", opts:[{l:"只要不是我倒下就行，我得赶紧冲线保住成绩。",v:1},{l:"挺替他惋惜的，都到最后了。但我自己也不会停下，会冲过去。",v:2},{l:"比我自己跑崩还难受，甚至想上去扶他一把一起冲线，成绩算什么。",v:3}] },
            { id:"q15", dim:"M2", text:"比赛中，一个完全不认识的跑者突然凑过来跟你搭话：“今天状态不错啊，目标多少？”，你会？", opts:[{l:"礼貌地微笑一下，然后默默加速把他甩开，不想被打乱节奏。",v:1},{l:"简单回应一句“330吧”，然后继续保持节奏，不再多说。",v:2},{l:"立刻开启话痨模式，从配速聊到补给，再聊到上周的LSD，越跑越兴奋。",v:3}] },
            { id:"q16", dim:"M2", text:"如果有人跟在你身后跑，并用垃圾话干扰你：“跟紧点，别掉队啊”，你会？", opts:[{l:"充耳不闻，当他是空气，内心默默骂他一句。",v:1},{l:"回头冷冷看他一眼，给他一个“你懂的”眼神，让他自己体会。",v:2},{l:"反手就是一句“跟紧点，别被我带崩了”，垃圾话大战就此开始。",v:3}] },
            { id:"q17", dim:"M3", text:"终点拱门就在前方100米，你余光扫到了赛道旁的官方摄影师，你的第一反应是？", opts:[{l:"累死了，表情肯定很狰狞，爱拍不拍，我只想赶紧过线。",v:1},{l:"努力挤出一个微笑，比个耶，虽然可能笑得比哭还难看。",v:2},{l:"立刻调整跑姿、收腹、摆臂，摆出最帅/最美的姿势，过线后第一件事就是找照片。",v:3}] },
            { id:"q18", dim:"M3", text:"赛后你在相册里发现了一张自己面目狰狞、五官乱飞的冲线照，你会怎么做？", opts:[{l:"无所谓，这就是真实的我，留着当作痛苦的回忆。",v:1},{l:"默默下载到手机里，但绝对不会发朋友圈，太丢人了。",v:2},{l:"立刻联系组委会求删除，或者花点钱把这张照片买断，不能流传出去。",v:3}] },
            { id:"q19", dim:"S1", text:"对于赛道上的「私补点」（朋友或跑团专门为你准备的补给），你的依赖程度是？", opts:[{l:"完全不需要，赛道上的官方水站和饮料站已经足够。",v:1},{l:"有私补当然更好，没有的话我也能靠自己带的能量胶撑过去。",v:2},{l:"没有提前安排好的私补点，我甚至不知道该怎么跑这场马拉松，那是我的精神支柱。",v:3}] },
            { id:"q20", dim:"S1", text:"如果你的家人/朋友在赛道边费了好大劲给你递上一杯水，你会？", opts:[{l:"接过来一口喝掉，杯子一扔继续跑，来不及交流。",v:1},{l:"接水瞬间必须眼神交流，并大声喊一句“谢谢！”，心里暖暖的。",v:2},{l:"提前一周就规划好私补点位、交接动作和补给内容，确保万无一失。",v:3}] },
            { id:"q21", dim:"S2", text:"比赛当天早上，从起床到存包前，你去厕所（无论大小）的次数通常是？", opts:[{l:"1次，有就有，没有拉倒，相信自己的代谢。",v:1},{l:"2-3次，确保万无一失，把身体排空才安心。",v:2},{l:"4次以上，哪怕只有一点点感觉也要去蹲一下，心理安慰最重要。",v:3}] },
            { id:"q22", dim:"S2", text:"存包前你看到移动厕所前排着一眼望不到头的长队，你会？", opts:[{l:"果断放弃，不排了，实在不行赛道上找个临时厕所。",v:1},{l:"排个10分钟看看，如果队伍不动我就走，不能耽误起跑。",v:2},{l:"死磕到底！宁可晚出发5分钟，也要把库存彻底清空，否则跑不踏实。",v:3}] },
            { id:"q23", dim:"S3", text:"完赛领完奖牌、走出终点区，你接下来最真实的安排是？", opts:[{l:"赶紧去拉伸区滚泡沫轴，然后冰敷，回酒店洗澡睡觉。",v:1},{l:"找个安静的咖啡馆，点杯喝的，坐着发发呆，回味一下比赛。",v:2},{l:"火锅/烧烤/精酿啤酒一条龙！必须把今天消耗的卡路里吃回来，明天瘸着上班也值。",v:3}] },
            { id:"q24", dim:"S3", text:"赛后的第一顿「欺骗餐」，你通常会怎么对待？", opts:[{l:"跟平时吃的减脂餐没什么两样，已经习惯了。",v:1},{l:"稍微放纵一下，吃点好的，比如来碗拉面加个蛋。",v:2},{l:"热量是什么？今天我吃的每一口都是对平时自律的补偿，油炸甜品全都要。",v:3}] },
            { id:"q25", dim:"R1", text:"回到家以后，那块沉甸甸的完赛奖牌通常会被你怎么处理？", opts:[{l:"扔进抽屉里，和以前的奖牌、杂物一起吃灰，可能再也不会看。",v:1},{l:"好好拍张照，发一条九宫格朋友圈，最后一张是奖牌特写，然后收起来。",v:2},{l:"我特意买了奖牌展示架，把它挂在客厅最显眼的地方，每天欣赏。",v:3}] },
            { id:"q26", dim:"R1", text:"如果有亲戚朋友来你家做客，无意中看到了你的奖牌墙/奖牌框，你会？", opts:[{l:"赶紧转移话题，觉得把这些挂出来有点难为情。",v:1},{l:"简单介绍一下“这是某某马拉松的奖牌”，然后就不多说了。",v:2},{l:"如数家珍地讲起每一块奖牌背后的故事、天气、配速，根本停不下来。",v:3}] },
            { id:"q27", dim:"R2", text:"比赛结束后，关于这场比赛的复盘，你的习惯是？", opts:[{l:"看一眼完赛短信上的净成绩，嗯，结束了，不想了。",v:1},{l:"打开跑步APP，看一眼每公里的分段配速，心里大概有个数。",v:2},{l:"把运动手表连上电脑，导出FIT文件，逐公里分析心率、步频、触地时间，写进训练日志。",v:3}] },
            { id:"q28", dim:"R2", text:"如果你发现比赛中某几公里明显跑崩了（掉速严重），你会怎么做？", opts:[{l:"崩都崩了，想它干嘛，下次再说。",v:1},{l:"回忆一下当时发生了什么：是坡太陡？还是补给没跟上？",v:2},{l:"反复回看那几公里的数据，并在跑友群里讨论半天，试图找出根本原因。",v:3}] },
            { id:"q29", dim:"R3", text:"冲过终点线，挂上奖牌，气喘吁吁的那一刻，你心里冒出的第一个念头是？", opts:[{l:"终于结束了……今年我再也不想跑了，我要休息一个月。",v:1},{l:"这次哪里没做好，下次比赛一定要跑得更好，突破自己。",v:2},{l:"立刻掏出手机看下一场心仪比赛的报名什么时候开始，手已经痒了。",v:3}] },
            { id:"q30", dim:"R3", text:"赛后第三天，腿不怎么疼了，乳酸也排得差不多了，你第一个冒出来的想法是？", opts:[{l:"休息真好，我要继续躺平，把剧追完。",v:1},{l:"该恢复训练了，今天去慢跑个5公里排排酸吧。",v:2},{l:"疯狂刷赛事日历和报名小程序，寻找下个月或者下下个月的比赛。",v:3}] }
        ];

        const CRAMP_Q1 = { id:"cramp_gate_q1", kind:"cramp", text:"比赛进行到30公里，你感觉小腿肌肉突然传来一阵熟悉的、隐隐约约的抽筋前兆。此时你会？", opts:[{l:"管他呢！抽筋是30公里后的标配，继续干，抽了再说。",v:1},{l:"赶紧掏出手机拍张照，记录下这「熟悉的感觉」，发个朋友圈。",v:2},{l:"立刻降速调整跑姿，小步高频，试图把抽筋的苗头压下去。",v:3},{l:"内心甚至有一丝期待：我就是专门来体验抽筋的，不抽不算跑马。",v:4}] };
        const CRAMP_Q2 = { id:"cramp_gate_q2", kind:"cramp", text:"如果抽筋真的不可避免地发生了，你被迫停在路边，你的第一反应是？", opts:[{l:"赶紧靠着栏杆拉伸，等肌肉缓解了再慢慢跑起来，完赛第一。",v:1},{l:"掏出手机打开录像，对着镜头说“兄弟们，又抽了！”，然后发到跑友群。",v:2}] };

        // 状态
        let currentView = 'home';
        let quizQuestions = [];
        let userAnswers = {};
        let currentIndex = 0;
        let crampQ2Answered = false;
        let radarChartInstance = null;

        const homeView = document.getElementById('homeView');
        const quizView = document.getElementById('quizView');
        const resultView = document.getElementById('resultView');
        const startBtn = document.getElementById('startBtn');
        const backHomeFromQuiz = document.getElementById('backHomeFromQuiz');
        const homeFromResult = document.getElementById('homeFromResult');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareQuiz() {
            let base = [...BASE_QUESTIONS];
            base = shuffle(base);
            const insertPos = Math.floor(Math.random() * (base.length + 1));
            base.splice(insertPos, 0, CRAMP_Q1);
            quizQuestions = base;
            userAnswers = {};
            currentIndex = 0;
            crampQ2Answered = false;
        }

        function switchView(view) {
            homeView.classList.remove('active');
            quizView.classList.remove('active');
            resultView.classList.remove('active');
            if (view === 'home') { homeView.classList.add('active'); currentView = 'home'; }
            else if (view === 'quiz') { quizView.classList.add('active'); currentView = 'quiz'; renderQuestion(); }
            else if (view === 'result') { resultView.classList.add('active'); currentView = 'result'; }
        }

        function renderQuestion() {
            if (currentIndex >= quizQuestions.length) {
                const q1Ans = userAnswers['cramp_gate_q1'];
                if ((q1Ans === 3 || q1Ans === 4) && !crampQ2Answered) {
                    quizQuestions.push(CRAMP_Q2);
                    renderQuestion();
                    return;
                }
                calculateAndShowResult();
                return;
            }
            const q = quizQuestions[currentIndex];
            document.getElementById('questionText').innerText = q.text;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            const selectedVal = userAnswers[q.id];
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (selectedVal === opt.v ? ' selected' : '');
                btn.innerHTML = `<i class="fas fa-${['circle','dot-circle','star'][idx%3] || 'circle'}"></i>${opt.l}`;
                btn.addEventListener('click', () => {
                    userAnswers[q.id] = opt.v;
                    renderQuestion();
                });
                container.appendChild(btn);
            });
            const total = quizQuestions.length;
            document.getElementById('currentQNumber').innerText = currentIndex+1;
            document.getElementById('totalQNumber').innerText = `/${total}`;
            document.getElementById('progressFill').style.width = ((currentIndex+1)/total*100)+'%';
            prevBtn.disabled = (currentIndex === 0);
        }

        function nextQuestion() {
            const q = quizQuestions[currentIndex];
            if (userAnswers[q.id] === undefined) { alert('请先选择一个选项'); return; }
            if (q.id === 'cramp_gate_q2') crampQ2Answered = true;
            if (currentIndex < quizQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                if (q.id === 'cramp_gate_q1' && (userAnswers[q.id]===3||userAnswers[q.id]===4) && !crampQ2Answered) {
                    quizQuestions.push(CRAMP_Q2);
                    currentIndex++;
                    renderQuestion();
                } else {
                    calculateAndShowResult();
                }
            }
        }

        function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }

        function drawRadarChart(userVec) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChartInstance) radarChartInstance.destroy();
            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: DIM_LABELS,
                    datasets: [{
                        label: '你的跑者维度',
                        data: userVec,
                        backgroundColor: 'rgba(180, 130, 240, 0.3)',
                        borderColor: '#d4af37',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffe28c',
                        pointBorderColor: '#1b0e2e',
                        pointRadius: 5,
                        pointHoverRadius: 7,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        r: {
                            min: 1,
                            max: 3,
                            ticks: { stepSize: 1, backdropColor: 'transparent', color: '#e0c3ff' },
                            grid: { color: '#d4af3740' },
                            angleLines: { color: '#d4af3760' },
                            pointLabels: { color: '#f0ddaa', font: { size: 12, family: 'Quicksand', weight: '500' } }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: '#2e1a47', titleColor: '#ffdfa0', bodyColor: '#f3e6ff' }
                    }
                }
            });
        }

        function calculateAndShowResult() {
            const dimScores = {};
            DIMENSION_ORDER.forEach(d => dimScores[d] = 0);
            BASE_QUESTIONS.forEach(q => { const val = userAnswers[q.id]; if (val) dimScores[q.dim] += val; });
            const userVec = DIMENSION_ORDER.map(d => {
                const raw = dimScores[d];
                if (raw <= 3) return 1; else if (raw === 4) return 2; else return 3;
            });
            
            let bestType = null, minDist = Infinity, bestExact = 0;
            PERSONALITY_TYPES.forEach(t => {
                const patternStr = t.pattern.replace(/-/g, '');
                const typeVec = patternStr.split('').map(ch => ch==='L'?1:ch==='M'?2:3);
                let dist = 0, exact = 0;
                for(let i=0;i<15;i++) { dist += Math.abs(userVec[i] - typeVec[i]); if(userVec[i] === typeVec[i]) exact++; }
                if(dist < minDist || (dist === minDist && exact > bestExact)) { minDist = dist; bestExact = exact; bestType = t; }
            });
            const similarity = Math.max(0, Math.round((1 - minDist/30)*100));
            let resultPersonality = bestType, isSpecial = false;
            if (userAnswers['cramp_gate_q2'] === 2) { resultPersonality = SPECIAL_TYPES[0]; isSpecial = true; }
            else if (similarity < 60) { resultPersonality = SPECIAL_TYPES[1]; isSpecial = true; }

            // 更新UI
            document.getElementById('resultCode').innerText = resultPersonality.code;
            document.getElementById('resultName').innerText = resultPersonality.cn;
            document.getElementById('resultDesc').innerText = resultPersonality.desc;
            if (isSpecial) {
                document.getElementById('matchDisplay').innerText = `✨ 隐藏人格 ✨`;
                document.getElementById('exactMatchInfo').innerText = `相似度 ${similarity}% · 触发特殊机制`;
            } else {
                document.getElementById('matchDisplay').innerText = `匹配度 ${similarity}%`;
                document.getElementById('exactMatchInfo').innerText = `精准命中 ${bestExact}/15 维`;
            }
            // 画雷达图 (使用用户向量，即使特殊人格也展示实际维度)
            drawRadarChart(userVec);
            switchView('result');
        }

        startBtn.addEventListener('click', ()=>{ prepareQuiz(); switchView('quiz'); });
        backHomeFromQuiz.addEventListener('click', ()=> switchView('home'));
        homeFromResult.addEventListener('click', ()=> switchView('home'));
        restartBtn.addEventListener('click', ()=>{ prepareQuiz(); switchView('quiz'); });
        nextBtn.addEventListener('click', nextQuestion);
        prevBtn.addEventListener('click', prevQuestion);
    })();
</script>
</body>
</html>
